<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./CSS_Color_Property.css">
</head>
<body>
    <h1>Welcome to CSS Color Property</h1>
    <!-- Defaulty all css color properties are converted into rgb format (i.e DECIMAL WAY) -->

    <h2>Hard Code Way</h2>
    <!-- Hard code is just giving the colorname directly eg.red,blue -->
    <p class="hardcode1">
        This is an example for hardcode1
    </p>

    <p class="hardcode2">
        This is an example for hardcode2
    </p>

    <h2>Hexadecimal Way</h2>

    <p class="Hexadecimal1">
        This is an example for Hexadecimal-1
    </p>

    <p class="Hexadecimal2">
        This is an example for Hexadecimal-1
    </p>

    <h2>Decimal Way</h2>

    <p class="decimal1">
        This is an example for Decimal-1
    </p>

    <p class="decimal2">
        This is an example for Decimal-1
    </p>


</body>
</html>
