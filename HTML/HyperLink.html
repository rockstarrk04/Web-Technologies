<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation of HyperLink</title>
</head>
<body>
    <h1 align = "center">
        Creation of Hyper Links
    </h1>

    <h3>Relative URL</h3>
    <a href="./Media_Tags.html" title="Media_Tags">
        click here
    </a>

    <h3>Absolute URL</h3>
    <a href="https://www.facebook.com/" title="facebook.com">
        click here
    </a>

    <h3>Image as clickable content</h3>
    <a href="https://www.facebook.com/" title="facebook.com">
        <img src="./Images/fb.png" alt="Image not found" height="50" width="50">
    </a>

    <h3>Using Target attribute</h3>

    <a href="https://www.youtube.com/" target="_parent" title="Using _parent">
        <img src="./Images/youtube.png" alt="Image not found" height="50" width="50">
    </a>
    <br><br><br>
     <a href="https://www.youtube.com/" target="_blank" title="Using _blank">
        <img src="./Images/youtube.png" alt="Image not found" height="50" width="50">
    </a>

</html>
